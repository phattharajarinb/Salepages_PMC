<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard</title>
    <link rel="stylesheet" href="admin.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- Backoffice: Dashboard สรุปจำนวนสินค้า ออเดอร์ และยอดขาย -->
    <div class="admin-shell" id="root"></div>
    <script src="admin.js"></script>
    <script>
      const appEl = initAdminPage("Dashboard");
      const products = getStore(PRODUCT_KEY),
        orders = getStore(ORDER_KEY);
      const revenue = orders.reduce((s, o) => s + Number(o.total || 0), 0);
      appEl.innerHTML = `<section class="cards"><div class="metric"><span>สินค้า</span><b>${products.length}</b></div><div class="metric"><span>ออเดอร์ทั้งหมด</span><b>${orders.length}</b></div><div class="metric"><span>ยอดขาย</span><b>${baht(revenue)}</b></div><div class="metric"><span>รอจัดส่ง</span><b>${orders.filter((o) => !["จัดส่งสำเร็จ", "ยกเลิก"].includes(o.status)).length}</b></div></section><section class="panel"><h2>คำสั่งซื้อล่าสุด</h2><div class="table-wrap"><table><thead><tr><th>เลขออเดอร์</th><th>ลูกค้า</th><th>วันที่สั่ง</th><th>สถานะ</th><th>ยอดรวม</th></tr></thead><tbody>${
        orders
          .slice(0, 8)
          .map(
            (o) =>
              `<tr><td>${o.id}</td><td>${o.customer?.name || "-"}</td><td>${fmtDate(o.createdAt)}</td><td><span class="status">${o.status}</span></td><td>${baht(o.total)}</td></tr>`,
          )
          .join("") || '<tr><td colspan="5">ยังไม่มีออเดอร์</td></tr>'
      }</tbody></table></div></section>`;
    </script>
  </body>
</html>
