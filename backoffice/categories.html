<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>หมวดหมู่สินค้า</title>
    <link rel="stylesheet" href="admin.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body>
    <!-- Backoffice: จัดการหมวดหมู่สินค้า -->
    <div class="admin-shell" id="root"></div>

    <script src="admin.js"></script>
    <script>
      const appEl = initAdminPage("หมวดหมู่สินค้า");

      function renderCategories() {
        const categories = getStore(CAT_KEY);

        appEl.innerHTML = `
          <section class="panel">
            <h2>เพิ่มหมวดหมู่</h2>
            <form class="form" id="catForm">
              <input id="catId" required placeholder="รหัส เช่น uniforms">
              <input id="catName" required placeholder="ชื่อหมวดหมู่ เช่น เครื่องแบบ">
              <button class="btn full" type="submit">เพิ่มหมวดหมู่</button>
            </form>
          </section>

          <section class="panel">
            <h2>รายการหมวดหมู่</h2>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>
                    <th>รหัส</th>
                    <th>ชื่อ</th>
                    <th>จัดการ</th>
                  </tr>
                </thead>
                <tbody>
                  ${
                    categories
                      .map(
                        (cat) => `
                          <tr>
                            <td>${escapeHtml(cat.id)}</td>
                            <td>${escapeHtml(cat.name)}</td>
                            <td>
                              <button class="small del" type="button" data-action="delete-category" data-id="${escapeHtml(cat.id)}">
                                ลบ
                              </button>
                            </td>
                          </tr>
                        `,
                      )
                      .join("") || '<tr><td colspan="3">ยังไม่มีหมวดหมู่</td></tr>'
                  }
                </tbody>
              </table>
            </div>
          </section>
        `;

        document.getElementById("catForm").addEventListener("submit", (event) => {
          event.preventDefault();

          const catId = document.getElementById("catId").value.trim();
          const catName = document.getElementById("catName").value.trim();
          const categories = getStore(CAT_KEY);

          if (categories.some((cat) => cat.id === catId)) {
            alert("รหัสหมวดหมู่นี้มีแล้ว");
            return;
          }

          setStore(CAT_KEY, [...categories, { id: catId, name: catName }]);
          renderCategories();
        });
      }

      appEl.addEventListener("click", (event) => {
        const button = event.target.closest("[data-action='delete-category']");
        if (!button) return;

        const id = button.dataset.id;
        if (!confirm("ลบหมวดหมู่นี้?")) return;

        setStore(
          CAT_KEY,
          getStore(CAT_KEY).filter((cat) => cat.id !== id),
        );
        renderCategories();
      });

      renderCategories();
    </script>
  </body>
</html>
